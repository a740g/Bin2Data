name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    name: Build Release (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux-x64
            os: ubuntu-latest
            asset_pattern: "qb64pe_lnx-*.tar.gz"
            bin_name: Bin2Data
            archive_name: Bin2Data-linux-x64.zip
          - name: Windows-x64
            os: windows-latest
            asset_pattern: "qb64pe_win-x64-*.7z"
            bin_name: Bin2Data.exe
            archive_name: Bin2Data-windows-x64.zip
          - name: Windows-arm64
            os: windows-11-arm
            asset_pattern: "qb64pe_win-arm64-*.7z"
            bin_name: Bin2Data.exe
            archive_name: Bin2Data-windows-arm64.zip
          - name: macOS-arm64
            os: macos-latest
            asset_pattern: "qb64pe_osx-*.tar.gz"
            bin_name: Bin2Data
            archive_name: Bin2Data-macos-arm64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download QB64-PE
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R QB64-Phoenix-Edition/QB64pe -p "${{ matrix.asset_pattern }}" --dir qb64_dl

      - name: Extract & Setup QB64-PE (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir qb64_src
          tar -xzf qb64_dl/*.tar.gz -C qb64_src
          SETUP_PATH=$(find qb64_src -name "setup_lnx.sh" -o -name "setup_osx.command" | head -n 1)
          if [ -z "$SETUP_PATH" ]; then
            echo "Error: Setup script not found in tarball."
            ls -R qb64_src
            exit 1
          fi
          SETUP_DIR=$(dirname "$SETUP_PATH")
          cd "$SETUP_DIR"
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update
            chmod +x setup_lnx.sh
            ./setup_lnx.sh 1
          else
            chmod +x setup_osx.command
            ./setup_osx.command 1
          fi
          echo "QB64PE_BIN_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Extract QB64-PE (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          7z x qb64_dl/*.7z -oqb64_src
          $subFolder = Get-ChildItem -Path qb64_src -Directory | Select-Object -First 1
          if ($subFolder) {
            Move-Item -Path "$($subFolder.FullName)\*" -Destination qb64_src\
          }
          echo "QB64PE_BIN_DIR=$((Get-Item qb64_src).FullName)" >> $env:GITHUB_ENV

      - name: Build
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ./qb64_src/qb64pe.exe -x -f:OptimizeCppProgram=true Bin2Data.bas -o "${{ matrix.bin_name }}"
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            "${{ env.QB64PE_BIN_DIR }}/qb64pe" -x -f:OptimizeCppProgram=true Bin2Data.bas -o "${{ matrix.bin_name }}"
          else
            "${{ env.QB64PE_BIN_DIR }}/qb64pe" -x Bin2Data.bas -o "${{ matrix.bin_name }}"
          fi

      - name: Package
        shell: bash
        run: |
          mkdir staging
          # Explicitly copy only allowed items
          cp -r include Bin2Data.bas LICENSE.txt README.md staging/
          cp ${{ matrix.bin_name }} staging/
          if [ -f Bin2Data.ico ]; then
            cp Bin2Data.ico staging/
          fi
          # Clean up any git metadata from submodules
          find staging -name ".git*" -exec rm -rf {} +

          cd staging
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a -tzip "../${{ matrix.archive_name }}" *
          else
            zip -r "../${{ matrix.archive_name }}" .
          fi
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # Use a unique name without .zip to avoid zip-in-zip confusion in the Actions UI
          name: asset-${{ matrix.name }}
          path: ${{ matrix.archive_name }}

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "asset-*"
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: true
          prerelease: false
